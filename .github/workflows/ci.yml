name: CI — Lint, Build & Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ──────────────────────────────────────────────────
  backend-audit:
    name: Backend — Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend deps
        run: npm ci --prefer-offline

      - name: Security audit (no critical/high)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Syntax check all routes
        run: |
          for f in src/api/routes/*.routes.js src/services/**/*.js server.js; do
            node --check "$f" || exit 1
          done
        shell: bash

  # ─── Frontend ─────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefer-offline

      - name: Security audit (no critical)
        run: npm audit --audit-level=critical
        continue-on-error: true   # next/postcss moderate warnings are acceptable

      - name: ESLint — must have 0 errors
        run: npx eslint src --ext .js,.jsx --max-warnings 40
        # max-warnings 40: cho phép tối đa 40 warnings (exhaustive-deps, no-img-element)
        # 0 errors là bắt buộc

      - name: Next.js Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # ─── Deploy guard (chỉ chạy khi push vào main) ────────────────
  deploy-ready:
    name: Deploy Ready Check
    needs: [backend-audit, frontend-lint-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: All checks passed
        run: echo "✅ Backend + Frontend CI passed — safe to deploy"
